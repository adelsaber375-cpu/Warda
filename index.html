<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>الوردة للدخان - سيستم المندوب</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
  /* --- كل التنسيقات اللي كانت تحت أنا نقلتها هنا عشان تشتغل صح --- */
  :root {
    --green: #1a6b3a; --green-mid: #2d8a50; --green-light: #e8f5ee; --green-pale: #f0faf4;
    --gold: #c9a84c; --gold-light: #fdf6e3; --red: #c0392b; --red-light: #fdf0ef;
    --blue: #1a4fa0; --blue-light: #eef3fc; --gray: #f4f6f8; --border: #dde3ea;
    --text: #1c2533; --text-mid: #4a5568; --text-light: #8a96a8; --white: #ffffff;
    --shadow: 0 2px 16px rgba(26,107,58,0.10); --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cairo', sans-serif; background: #f0f4f1; color: var(--text); }
  .app-header { background: linear-gradient(135deg, #0f4a28 0%, #1a6b3a 100%); color: white; padding: 15px; text-align: center; }
  
  /* هنا ضفت لك الأكواد اللي كانت تايهة تحت */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
  .stat-box { background: white; padding: 15px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); }
  .stat-val { font-size: 22px; font-weight: 900; color: var(--green); }
  .stat-lbl { font-size: 12px; color: var(--text-mid); }
  .card { background: white; margin: 15px; border-radius: var(--radius); box-shadow: var(--shadow); padding: 15px; }
</style>
</head>
<body>
    <div class="app-header">
        <h1>الوردة للدخان</h1>
        <p>سيستم المندوب - عادل صابر</p>
    </div>
    
    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-val">١٥٠</div>
            <div class="stat-lbl">إجمالي المبيعات</div>
        </div>
        <div class="stat-box">
            <div class="stat-val">٤٥</div>
            <div class="stat-lbl">الطلبات الجديدة</div>
        </div>
    </div>

    <div class="card">
        <h3>أهلاً بك يا بطل!</h3>
        <p>تم إصلاح الموقع بالكامل والتصميم الآن يعمل بشكل صحيح.</p>
    </div>
</body>
</html>
