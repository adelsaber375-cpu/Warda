<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a6b3a">
<title>الوردة للدخان - سيستم المندوب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  /* تم دمج كل أكواد التنسيق الاحترافية التي أرسلتها */
  :root {
    --green: #1a6b3a; --green-mid: #2d8a50; --green-light: #e8f5ee; --green-pale: #f0faf4;
    --gold: #c9a84c; --gold-light: #fdf6e3; --red: #c0392b; --red-light: #fdf0ef;
    --blue: #1a4fa0; --blue-light: #eef3fc; --gray: #f4f6f8; --border: #dde3ea;
    --text: #1c2533; --text-mid: #4a5568; --text-light: #8a96a8; --white: #ffffff;
    --shadow: 0 2px 16px rgba(26,107,58,0.10); --radius: 14px; --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Cairo', sans-serif; background: #f0f4f1; color: var(--text); min-height: 100vh; }
  .app-header { background: linear-gradient(135deg, #0f4a28 0%, #1a6b3a 100%); padding: 10px; color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; }
  .logo-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .nav-tabs { display: flex; background: rgba(0,0,0,0.2); overflow-x: auto; }
  .nav-tab { flex: 1; padding: 12px; text-align: center; color: rgba(255,255,255,0.7); cursor: pointer; border-bottom: 3px solid transparent; font-size: 13px; font-weight: 600; }
  .nav-tab.active { color: #fff; border-bottom-color: var(--gold); background: rgba(255,255,255,0.1); }
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); margin: 15px; overflow: hidden; border: 1px solid var(--border); }
  .card-header { background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%); padding: 12px 16px; color: #fff; font-weight: 700; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
  .stat-box { background: white; border-radius: var(--radius); padding: 15px; text-align: center; border: 1px solid var(--border); }
  .stat-val { font-size: 22px; font-weight: 900; color: var(--green); }
  .stat-lbl { font-size: 11px; color: var(--text-mid); margin-top: 4px; }
  .product-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); justify-content: space-between; }
  .prod-name { font-weight: 700; font-size: 14px; }
  .prod-stock { padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 14px; background: var(--green-light); color: var(--green); }
</style>
</head>
<body>
    <div class="app-header">
        <div class="header-inner">
            <div class="logo-icon">🌿</div>
            <div style="text-align:right; flex:1; margin-right:10px;">
                <h1 style="font-size:18px;">الوردة للدخان</h1>
                <p style="font-size:11px; opacity:0.8;">سيستم المندوب - عادل صابر</p>
            </div>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="nav-tab active">الرئيسية</div>
        <div class="nav-tab">فاتورة جديدة</div>
        <div class="nav-tab">المخزن</div>
        <div class="nav-tab">التقارير</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-val">١,٢٥٠</div>
            <div class="stat-lbl">إجمالي المبيعات (ج.م)</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" style="color:var(--blue)">٢٤</div>
            <div class="stat-lbl">عدد الفواتير</div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">قائمة الأصناف السريعة</div>
        <div class="product-row">
            <span class="prod-name">كليوباترا بوكس</span>
            <span class="prod-stock">٥٠</span>
        </div>
        <div class="product-row">
            <span class="prod-name">إل إم أزرق</span>
            <span class="prod-stock">٣٢</span>
        </div>
        <div class="product-row">
            <span class="prod-name">ميريت أصفر</span>
            <span class="prod-stock" style="background:#fff3e0; color:#e65100;">٥</span>
        </div>
    </div>

</body>
</html>
